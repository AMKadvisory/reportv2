<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - AMK Valuation Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-hero { background: linear-gradient(135deg, var(--navy) 0%, #1a3a5c 100%); padding: 2rem 2.5rem; margin-bottom: 2rem; border-radius: var(--radius-lg); display: flex; justify-content: space-between; align-items: center; }
        .admin-hero h1 { font-family: var(--font-display); color: var(--gold); font-size: 2rem; margin-bottom: 4px; }
        .admin-hero p { color: var(--gray-400); font-size: 0.9rem; }

        /* Table section */
        .submissions-table-wrapper { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--gray-200); overflow: hidden; margin-bottom: 2rem; }
        .table-section-header { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gray-200); gap: 1rem; flex-wrap: wrap; }
        .table-section-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 8px; }
        .table-section-count { font-size: 0.75rem; font-weight: 600; background: var(--gray-100); color: var(--gray-600); padding: 2px 10px; border-radius: 999px; }

        .search-box { display: flex; align-items: center; gap: 8px; background: var(--gray-100); border-radius: var(--radius-sm); padding: 0.45rem 1rem; border: 1.5px solid transparent; transition: all var(--transition); min-width: 220px; }
        .search-box:focus-within { background: var(--white); border-color: var(--gold); }
        .search-box input { border: none; background: transparent; outline: none; font-family: var(--font-body); font-size: 0.875rem; color: var(--navy); width: 100%; }
        .search-box input::placeholder { color: var(--gray-400); }

        .submissions-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .submissions-table th { padding: 0.65rem 1rem; background: var(--navy); color: var(--gold); font-weight: 600; text-align: left; white-space: nowrap; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
        .submissions-table td { padding: 0.7rem 1rem; border-bottom: 1px solid var(--gray-200); color: var(--gray-800); vertical-align: middle; }
        .submissions-table tr:last-child td { border-bottom: none; }
        .submissions-table tr:hover td { background: var(--gray-100); }
        .action-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn-icon-preview { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; padding: 0; border-radius: var(--radius-sm); border: 1.5px solid var(--gray-300); background: var(--white); color: var(--gray-600); cursor: pointer; transition: all var(--transition); }
        .btn-icon-preview:hover { background: var(--navy); border-color: var(--navy); color: var(--gold); }
        .btn-icon-preview svg { display: block; }
        .empty-table { text-align: center; padding: 2.5rem; color: var(--gray-400); font-size: 0.875rem; }

        .user-cell { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--navy-mid); color: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
        .user-name  { font-weight: 500; color: var(--navy); font-size: 0.85rem; }
        .user-email { font-size: 0.75rem; color: var(--gray-400); }

        /* Section filter tabs */
        .section-filter-tabs { display: flex; gap: 4px; }
        .section-filter-tab { padding: 4px 12px; border-radius: var(--radius-sm); font-size: 0.78rem; font-weight: 500; cursor: pointer; border: 1px solid var(--gray-200); background: transparent; color: var(--gray-600); transition: all var(--transition); font-family: var(--font-body); }
        .section-filter-tab.active { background: var(--navy); color: var(--gold); border-color: var(--navy); }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">AMK <span>Admin Panel</span></div>
    <div class="navbar-right">
        <div class="navbar-user">
            <div class="user-avatar-sm" id="avatar-initial">A</div>
            <span id="admin-name">Loading...</span>
        </div>
        <a href="dashboard.html" class="btn btn-outline btn-sm">Dashboard</a>
        <button class="btn btn-outline btn-sm" onclick="Auth.logout()">Sign Out</button>
    </div>
</nav>

<div class="page-container">

    <div class="admin-hero">
        <div>
            <h1>Admin Dashboard</h1>
            <p>Manage all submitted valuation reports</p>
        </div>
        <button class="btn btn-primary" onclick="Admin.loadAllSubmissions(); Admin.loadStats()">Refresh</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Reports</div><div class="stat-value" id="stat-total">--</div></div>
        <div class="stat-card"><div class="stat-label">Submitted</div><div class="stat-value" id="stat-submitted" style="color:var(--info)">--</div></div>
        <div class="stat-card"><div class="stat-label">Reviewed</div><div class="stat-value" id="stat-reviewed" style="color:var(--success)">--</div></div>
        <div class="stat-card"><div class="stat-label">Drafts</div><div class="stat-value" id="stat-draft" style="color:var(--gold)">--</div></div>
    </div>

    <!-- Global Search -->
    <div style="margin-bottom:1.5rem;">
        <div class="search-box" style="max-width:400px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Search by letter ref, account name, email..." oninput="Admin.search(this.value)">
        </div>
    </div>

    <!-- Vehicle Valuation Section -->
    <div class="submissions-table-wrapper">
        <div class="table-section-header">
            <div class="table-section-title">
                🚗 BBPLC Vehicle Valuation
                <span class="table-section-count" id="count-vehicle">0</span>
            </div>
            <div class="section-filter-tabs">
                <button class="section-filter-tab active" onclick="Admin.filterSection('vehicle','all',this)">All</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('vehicle','submitted',this)">Submitted</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('vehicle','reviewed',this)">Reviewed</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('vehicle','draft',this)">Drafts</button>
            </div>
        </div>
        <div id="table-vehicle"><div class="empty-table"><div class="loading-spinner"></div></div></div>
    </div>

    <!-- CBPLC Vehicle Valuation Section -->
    <div class="submissions-table-wrapper">
        <div class="table-section-header">
            <div class="table-section-title">
                🚗 CBPLC Vehicle Valuation
                <span class="table-section-count" id="count-cbplc">0</span>
            </div>
            <div class="section-filter-tabs">
                <button class="section-filter-tab active" onclick="Admin.filterSection('cbplc','all',this)">All</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('cbplc','submitted',this)">Submitted</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('cbplc','reviewed',this)">Reviewed</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('cbplc','draft',this)">Drafts</button>
            </div>
        </div>
        <div id="table-cbplc"><div class="empty-table"><div class="loading-spinner"></div></div></div>
    </div>

    <!-- EBL SME Property Valuation Section -->
    <div class="submissions-table-wrapper">
        <div class="table-section-header">
            <div class="table-section-title">
                🏠 EBL SME Land &amp; Building
                <span class="table-section-count" id="count-property">0</span>
            </div>
            <div class="section-filter-tabs">
                <button class="section-filter-tab active" onclick="Admin.filterSection('property','all',this)">All</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('property','submitted',this)">Submitted</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('property','reviewed',this)">Reviewed</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('property','draft',this)">Drafts</button>
            </div>
        </div>
        <div id="table-property"><div class="empty-table"><div class="loading-spinner"></div></div></div>
    </div>

    <!-- EBL HL Land & Building Section -->
    <div class="submissions-table-wrapper">
        <div class="table-section-header">
            <div class="table-section-title">
                🏠 EBL HL Land &amp; Building
                <span class="table-section-count" id="count-ebl">0</span>
            </div>
            <div class="section-filter-tabs">
                <button class="section-filter-tab active" onclick="Admin.filterSection('ebl','all',this)">All</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('ebl','submitted',this)">Submitted</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('ebl','reviewed',this)">Reviewed</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('ebl','draft',this)">Drafts</button>
            </div>
        </div>
        <div id="table-ebl"><div class="empty-table"><div class="loading-spinner"></div></div></div>
    </div>

    <!-- EBL HL Flat Section -->
    <div class="submissions-table-wrapper">
        <div class="table-section-header">
            <div class="table-section-title">
                🏢 EBL HL Flat
                <span class="table-section-count" id="count-ebl-flat">0</span>
            </div>
            <div class="section-filter-tabs">
                <button class="section-filter-tab active" onclick="Admin.filterSection('ebl-flat','all',this)">All</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('ebl-flat','submitted',this)">Submitted</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('ebl-flat','reviewed',this)">Reviewed</button>
                <button class="section-filter-tab" onclick="Admin.filterSection('ebl-flat','draft',this)">Drafts</button>
            </div>
        </div>
        <div id="table-ebl-flat"><div class="empty-table"><div class="loading-spinner"></div></div></div>
    </div>

</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="ui.js"></script>
<script src="core/db.js"></script>
<script src="core/pdf-engine.js"></script>
<script src="forms/vehicle-valuation/pdf-template.js"></script>
<script src="forms/property-valuation/pdf-template.js"></script>
<script src="forms/ebl-land-building/pdf-template.js"></script>
<script src="forms/cbl-vehicle-valuation/pdf-template.js"></script>
<script src="forms/ebl-flat/pdf-template.js"></script>

<script>
const Admin = {
    allData: [],
    sectionFilters: { vehicle: 'all', cbplc: 'all', property: 'all', ebl: 'all', 'ebl-flat': 'all' },
    searchQuery: '',

    getFormType(sub) {
        const fd = sub.form_data || {};
        const type = fd._formType || sub.form_type || 'vehicle-valuation';
        if (type === 'ebl-flat')         return 'ebl-flat';
        if (type === 'ebl-land-building') return 'ebl';
        if (type === 'property-valuation') return 'property';
        if (type === 'cbplc-vehicle-valuation') return 'cbplc';
        return 'vehicle';
    },

    async init() {
        const auth = await Auth.requireAdmin();
        if (!auth) return;
        const { profile } = auth;
        document.getElementById('admin-name').textContent = profile.full_name || profile.email;
        document.getElementById('avatar-initial').textContent = (profile.full_name || profile.email)[0].toUpperCase();
        await this.loadStats();
        await this.loadAllSubmissions();
    },

    async loadStats() {
        try {
            const { data } = await db.from('submissions').select('status');
            const counts = { total: data.length, draft: 0, submitted: 0, reviewed: 0 };
            data.forEach(s => { if (counts[s.status] !== undefined) counts[s.status]++; });
            document.getElementById('stat-total').textContent     = counts.total;
            document.getElementById('stat-submitted').textContent = counts.submitted;
            document.getElementById('stat-reviewed').textContent  = counts.reviewed;
            document.getElementById('stat-draft').textContent     = counts.draft;
        } catch(err) { console.error(err); }
    },

    async loadAllSubmissions() {
        ['table-vehicle','table-cbplc','table-property','table-ebl','table-ebl-flat'].forEach(id => {
            document.getElementById(id).innerHTML = '<div class="empty-table"><div class="loading-spinner"></div></div>';
        });
        try {
            const { data, error } = await db.from('submissions').select('*').order('updated_at', { ascending: false });
            if (error) throw error;

            const userIds = [...new Set(data.map(s => s.user_id).filter(Boolean))];
            let profileMap = {};
            if (userIds.length > 0) {
                const { data: profiles } = await db.from('profiles').select('*').in('id', userIds);
                if (profiles) profiles.forEach(p => { profileMap[p.id] = p; });
            }

            this.allData = data.map(s => ({ ...s, _profile: profileMap[s.user_id] || null }));
            this.renderAllSections();
        } catch(err) {
            ['table-vehicle','table-cbplc','table-property','table-ebl','table-ebl-flat'].forEach(id => {
                document.getElementById(id).innerHTML = `<div class="empty-table" style="color:var(--danger);">Error: ${err.message}</div>`;
            });
        }
    },

    filterSection(section, status, btn) {
        this.sectionFilters[section] = status;
        const parent = btn.closest('.section-filter-tabs');
        parent.querySelectorAll('.section-filter-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.renderSection(section);
    },

    search(query) {
        this.searchQuery = query.toLowerCase();
        this.renderAllSections();
    },

    applySearch(list) {
        if (!this.searchQuery) return list;
        const q = this.searchQuery;
        return list.filter(sub => {
            const fd = sub.form_data || {};
            const s = [
                fd.letter_ref, fd.reference_account_name,
                fd.file_reference_number, fd.reference_no,
                sub._profile?.email, sub._profile?.full_name
            ].join(' ').toLowerCase();
            return s.includes(q);
        });
    },

    renderAllSections() {
        this.renderSection('vehicle');
        this.renderSection('cbplc');
        this.renderSection('property');
        this.renderSection('ebl');
        this.renderSection('ebl-flat');
    },

    renderSection(section) {
        const grouped = { vehicle: [], cbplc: [], property: [], ebl: [], 'ebl-flat': [] };
        this.allData.forEach(sub => { grouped[this.getFormType(sub)].push(sub); });

        document.getElementById('count-vehicle').textContent    = grouped.vehicle.length;
        document.getElementById('count-cbplc').textContent      = grouped.cbplc.length;
        document.getElementById('count-property').textContent   = grouped.property.length;
        document.getElementById('count-ebl').textContent        = grouped.ebl.length;
        document.getElementById('count-ebl-flat').textContent   = grouped['ebl-flat'].length;

        const statusFilter = this.sectionFilters[section];
        let list = grouped[section];
        if (statusFilter !== 'all') list = list.filter(s => s.status === statusFilter);
        list = this.applySearch(list);

        const container = document.getElementById('table-' + section);
        if (list.length === 0) {
            container.innerHTML = `<div class="empty-table">No reports found.</div>`;
            return;
        }

        const isVehicle  = section === 'vehicle' || section === 'cbplc';
        const isEBL      = section === 'ebl';
        const isEBLFlat  = section === 'ebl-flat';
        const formUrl    = isEBLFlat ? 'ebl-flat-form.html'
                         : isEBL    ? 'ebl-land-building-form.html'
                         : (section === 'cbplc') ? 'cbplc-vehicle.html'
                         : isVehicle ? 'form.html'
                         : 'property-form.html';

        const rows = list.map(sub => {
            const fd     = sub.form_data || {};
            const name   = sub._profile?.full_name || sub._profile?.email || 'Unknown';
            const email  = sub._profile?.email || '—';
            const date   = new Date(sub.updated_at).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
            const sc     = { draft:'status-draft', submitted:'status-submitted', reviewed:'status-reviewed' }[sub.status] || '';
            const sl     = sub.status.charAt(0).toUpperCase() + sub.status.slice(1);

            let fileRef, refNo, accountName;
            if (isVehicle) {
                fileRef     = fd.file_reference_number || fd.letter_ref || '—';
                refNo       = fd.letter_ref || '—';
                accountName = fd.reference_account_name || fd.referred_by || '—';
            } else if (isEBLFlat) {
                fileRef     = fd.property_location || fd.valuation_ref_no || 'EBL HL Flat';
                refNo       = fd.reference_no || fd.valuation_ref_no || '—';
                accountName = fd.reference_account_name || '—';
            } else {
                fileRef     = fd.property_location || fd.valuation_ref_no || (isEBL ? 'EBL Land & Building' : 'Property Report');
                refNo       = fd.reference_no || fd.valuation_ref_no || '—';
                accountName = fd.reference_account_name || '—';
            }

            const reviewedBtn = sub.status !== 'reviewed'
                ? `<button class="btn btn-sm btn-success" onclick="Admin.markReviewed('${sub.id}', this)">Reviewed</button>`
                : '';

            return `<tr>
                <td>
                    <div class="user-cell">
                        <div class="user-avatar">${(name||'?')[0].toUpperCase()}</div>
                        <div>
                            <div class="user-name">${name}</div>
                            <div class="user-email">${email}</div>
                        </div>
                    </div>
                </td>
                <td style="font-weight:500;">${fileRef}</td>
                <td>${refNo}</td>
                <td>${accountName}</td>
                <td><span class="status-badge ${sc}">${sl}</span></td>
                <td>${date}</td>
                <td>
                    <div class="action-buttons">
                        <a href="${formUrl}?id=${sub.id}&admin=true" class="btn btn-sm btn-outline">Edit</a>
                        <button class="btn btn-sm btn-icon-preview" title="Preview PDF" onclick="Admin.previewReport('${sub.id}','${section}')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                        <button class="btn btn-sm btn-primary" onclick="Admin.downloadReport('${sub.id}','${section}')">PDF</button>
                        ${reviewedBtn}
                    </div>
                </td>
            </tr>`;
        }).join('');

        const colLabel = isVehicle ? 'File Ref.' : 'Report';
        const col2     = isVehicle ? 'Letter Ref.' : 'Reference No.';
        const col3     = isVehicle ? 'Referred By' : 'Account Name';

        container.innerHTML = `
            <table class="submissions-table">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>${colLabel}</th>
                        <th>${col2}</th>
                        <th>${col3}</th>
                        <th>Status</th>
                        <th>Last Updated</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    },

    async markReviewed(id, btn) {
        btn.disabled = true; btn.textContent = '...';
        try {
            const { error } = await db.from('submissions').update({ status: 'reviewed' }).eq('id', id);
            if (error) throw error;
            UI.showToast('Marked as reviewed', 'success');
            await this.loadStats();
            await this.loadAllSubmissions();
        } catch(err) {
            UI.showToast('Error: ' + err.message, 'error');
            btn.disabled = false; btn.textContent = 'Reviewed';
        }
    },

    async downloadReport(submissionId, section) {
        try {
            const sub = this.allData.find(s => s.id === submissionId);
            let formData = sub ? sub.form_data : null;
            if (!formData) {
                const { data } = await db.from('submissions').select('*').eq('id', submissionId).single();
                formData = data?.form_data;
            }
            if (section === 'property') {
                await PDFEngine.generate(formData, PropertyValuationPDF);
            } else if (section === 'ebl') {
                await PDFEngine.generate(formData, EBLLandBuildingPDF);
            } else if (section === 'ebl-flat') {
                await PDFEngine.generate(formData, EBLFlatPDF);
            } else if (section === 'cbplc') {
                await PDFEngine.generate(formData, CBLVehicleValuationPDF);
            } else {
                await PDFEngine.generate(formData, VehicleValuationPDF);
            }
        } catch(err) { UI.showToast('PDF failed: ' + err.message, 'error'); }
    },

    async previewReport(submissionId, section) {
        try {
            const sub = this.allData.find(s => s.id === submissionId);
            let formData = sub ? sub.form_data : null;
            if (!formData) {
                const { data } = await db.from('submissions').select('*').eq('id', submissionId).single();
                formData = data?.form_data;
            }
            let template;
            if (section === 'property')      template = PropertyValuationPDF;
            else if (section === 'ebl')      template = EBLLandBuildingPDF;
            else if (section === 'ebl-flat') template = EBLFlatPDF;
            else if (section === 'cbplc')    template = CBLVehicleValuationPDF;
            else                             template = VehicleValuationPDF;
            await PDFEngine.preview(formData, template);
        } catch(err) { UI.showToast('Preview failed: ' + err.message, 'error'); }
    }
};

document.addEventListener('DOMContentLoaded', () => Admin.init());
</script>

</body>
</html>
